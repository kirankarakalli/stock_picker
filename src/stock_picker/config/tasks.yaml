market_analyst_task:
  description: >
    Use the Stock Data Tool to fetch real stock data for each ticker in {topic}.
    Analyze only the data returned by the tool.
    Focus on company name, current price, market cap, PE ratio, revenue growth,
    profit margin, debt to equity, and analyst recommendation.
    Do not invent or estimate missing values.
    
  expected_output: >
    A clear fundamental analysis for each stock in {topic}, including
    strengths, weaknesses, and important missing data.

  agent: market_analyst

news_analysis_task:
  description: >
    Use the News Data Tool to fetch recent news for each stock.
    Summarize positive signals, negative signals, and overall sentiment.
    Use only the news returned by the tool.
  expected_output: >
    A news and sentiment summary for each stock, including positive signals,
    negative signals, and uncertainty.
  agent: news_analyst
  context:
    - market_analyst_task

risk_analysis_task:
  description: >
    Review the market analysis produced by the market analyst.
    Identify valuation risk, debt risk, growth risk, and profitability risk.
  expected_output: >
    A risk summary for each stock with risk level: LOW, MEDIUM, or HIGH.
   
  agent: risk_analyst
  context:
    - market_analyst_task
    - news_analysis_task

stock_picker_task:
  description: >
    Use the Stock Scoring Tool to calculate scores for each stock.
    Combine market analysis, news analysis, risk analysis,
    and stock scores to create a ranked watchlist.

    Higher scores should generally rank higher.
  expected_output: >
    A ranked stock watchlist including:
    - score
    - ranking
    - reason for ranking
    - risk level
    - final conclusion

  agent: stock_picker
  context:
    - market_analyst_task
    - news_analysis_task
    - risk_analysis_task

